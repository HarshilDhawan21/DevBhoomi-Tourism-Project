    <style>
      :root {
        --bg: #0a1628;
        --card: rgba(255, 255, 255, 0.05);
        --border: rgba(255, 255, 255, 0.08);
        --accent: #ff6b00;
      }

      body {
        margin: 0;
        font-family: "Poppins", sans-serif;
        background: var(--bg);
        color: white;
      }

      .container {
        padding: 110px 40px 40px;
      }

      .title {
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 10px;
      }

      .subtitle {
        color: #aaa;
        margin-bottom: 30px;
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 20px;
      }

      .gallery-card {
        position: relative;
        border-radius: 14px;
        overflow: hidden;
        cursor: pointer;
        border: 1px solid var(--border);
        transition: 0.3s;
      }

      .gallery-card:hover {
        transform: scale(1.05);
      }

      .gallery-card img {
        width: 100%;
        height: 250px;
        object-fit: cover;
      }

      .overlay {
        position: absolute;
        bottom: 0;
        width: 100%;
        padding: 15px;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
      }

      .overlay h3 {
        margin: 0;
        font-size: 16px;
      }

      .overlay p {
        margin: 4px 0 0;
        font-size: 12px;
        color: #ddd;
      }
